name: Python CI

on:
  - push
  - pull_request

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv ruff pytest pytest-cov
          make install

      - name: Run linter
        run: make lint

      - name: Run tests
        run: make test

      - name: Run test coverage
        run: |
          pytest --cov=gendiff --cov-report=xml:coverage.xml tests/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=julverik_python-project-50
            -Dsonar.organization=julverik
            -Dsonar.python.coverage.reportPaths=coverage.xml